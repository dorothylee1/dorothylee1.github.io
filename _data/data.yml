      - title: 클라썸(Telta AI) | 국내 대형 반도체 장비기업 전사 직무 역량 진단 운영 및 자동화
        tagline: | 
            고객사는 기존에 HR 담당자가 엑셀 수기 입력과 부서 간 이메일을 통해 전사 직무역량·리더십 진단을 운영하고 있었음. 해당 방식은 휴먼 에러 발생이 잦고 운영 공수가 과도하게 소요되었으며, 개인별 리포트 발행에 구조적 한계가 존재했음.
            이를 해결하기 위해 다면진단 수행에 필요한 기능 요구사항을 PRD로 작성하여 제품팀에 직접 제안했음. PM과 기능 우선순위를 협의하고 반복적인 시뮬레이션을 통해 기능을 구현했으며, 파일럿 운영 과정에서 실제 고객사 사용 환경의 문제를 즉각 피드백하여 시스템을 고도화했음.
            본 진단이 승진·성과 평가와 직결되는 특성상 정확도 확보가 최우선 과제였음. 직급·부서·연차별로 상이한 가중치를 통합한 Master Map 데이터를 설계하고, Apps Script 기반으로 복잡한 점수 산출 로직을 자동화했음. 여기에 AI 모델을 연결하여 피진단자별 맞춤 성장 가이드 문구를 생성해 리포트에 탑재했으며, 고객사 보유 교육과정 데이터 풀을 정제하여 개인별 강점·보완점에 기반한 교육과정 자동 매칭 프롬프트를 설계했음. 이후 개발자들과 협업하여 해당 기능을 제품 내부 기능으로 내재화했음.
            그 결과 1,350명 규모의 전사 역량 진단을 오류 없이 운영했고, 수기 기반 프로세스를 시스템화함으로써 고객사 HR 운영 효율을 구조적으로 개선했음. 개인화된 리포트 및 교육과정 매칭 기능은 단순 진단 결과 전달을 넘어 구성원의 실질적 성장 경로를 제시하는 HR 의사결정 도구로 기능했으며, 이에 대한 고객사의 높은 만족을 바탕으로 2026년 2배 이상 규모의 리커링 계약을 확보했음.
