      - title: 클라썸(Telta AI) | 국내 대기업 그룹 연수원 - 신임 임원 역량 진단 운영 및 자동화
        tagline: | 
            신임 임원을 대상으로 한 진단은 평가 결과가 그룹 인사 의사결정에 직접 반영되는 특성상, 일반 직원 대상 진단 대비 훨씬 높은 정확도와 일관성이 요구됐음. 피진단자가 임원급인 만큼 채점 기준의 모호함이나 결과 오류는 허용되지 않는 환경이었으며, 147명 전원에 대해 동일한 품질 기준을 유지하는 것이 핵심 과제였음.
            이를 위해 발화 데이터 수집부터 AI 채점, 결과 검증, 리포트 생성까지의 전 단계를 정의한 채점 워크플로우를 직접 설계하고 10건 이상의 케이스에 반복 적용하며 안정성을 검증했음. 채점 일관성 확보를 위해 동일 발화에 대한 AI 모델 간 결과 편차를 모니터링하고, 기준값 이상의 편차 발생 시 재채점 루프가 작동하도록 설계했음. 리포트 자동화는 Apps Script 기반으로 구축했음. 내부 AI 툴에서 생성된 채점 결과 및 코멘트를 Export하여 피진단자별 데이터 슬롯에 자동 매핑하고, 최종 PDF로 변환·출력되는 파이프라인을 설계했음.
            기존에는 코치 1인이 리포트 1건을 작성하는 데 1일이 소요되었으나, 자동화 파이프라인 구축 이후 147명 전원의 리포트를 2일 내에 딜리버리했음. 인당 제작 시간 기준 약 99% 단축. 300건의 리포트를 오류 없이 딜리버리했으며, 고객사의 신뢰를 바탕으로 지속적인 협력 관계를 유지하고 있음.
