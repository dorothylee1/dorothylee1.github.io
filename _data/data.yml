      - title: 클라썸(Telta AI) | 국내 최대 공기업 리더십 역량 진단 프로젝트 운영 및 자동화
        tagline: | 
            기존에는 코치(사람) 중심의 평가에 의존해 객관성이 부족했음. 채점자 주관에 따른 편차가 컸고, 직급별 점수 구간 기준이 모호해 정확한 평가에 한계가 있었음. 
            이를 해결하기 위해 7개 직급 × 4개 루브릭 체계로 총 28개 루브릭을 고도화함. HR 전문가가 설계한 평가 행동 기준 루브릭 초안을 기반으로, 직급별 난이도 차별화를 위해 관련 논문 및 리더십 이론을 추가 리서치하고 반영함. AI 모델 간 평가 결과 편차를 통계적으로 실험·검증하여 최종 약 5만 줄 규모의 채점 루브릭을 완성했고, 루브릭 생성 로직 자체를 데이터 파이프라인과 연계해 자동화함. 
            또한 n8n 기반 자동화 파이프라인을 구축해 50명 규모 리포트가 5분 내 생성되도록 처리 속도를 단축했음. 진단 결과를 누적 DB화하여 시계열 데이터로 관리할 수 있도록 구조를 설계했고, 이를 기반으로 한 대시보드를 직접 제작해 제품에 탑재함. 
            그 결과 누적 300명 이상의 진단과 2,000부의 리포트를 오류 없이 딜리버리했고, 이 신뢰를 바탕으로 월 누적 1천만 원 이상, 연간 누적 N억 원 이상의 리커링 계약으로 확장됨. 고객사 본사에서 대표 및 텔타 팀을 초빙해 강연을 요청했으며, 타 부서로도 추천이 이어져 현재까지 프로젝트가 지속·확장되고 있음.
