        tagline: | 
            역량 진단 프로젝트 운영 과정에서 축적된 루브릭 자산과 AI 채점 노하우가 채용 인터뷰 영역에도 적용 가능하다고 판단했음. 사업개발팀과의 협업을 통해 채용 인터뷰 AI 진단 도구로서의 제품 방향성을 수립하고, PRD를 직접 작성하여 제품 기획을 주도했음.
            제품 설계의 핵심은 채용 현장의 특수성을 반영하는 것이었음. 녹음 파일이 서버에 남는 것을 꺼리는 고객사의 니즈를 반영하여 음성은 저장하지 않고 실시간 STT로 텍스트만 처리하는 방식을 설계했으며, 인터뷰 종료 후 15분 이내 리포트 자동 생성을 목표 기준으로 설정했음. 파이프라인은 실시간 STT → LLM 기반 화자 분리 → 루브릭 채점 → 결과 JSON 전처리 → HTML 리포트 렌더링 → PDF 변환 순으로 구성했음.
            리포트 자동화 파이프라인은 사내 최초로 n8n 기반으로 직접 구축했음. 제품 API 연동 노드를 연결하고 채점 결과를 HTML 리포트로 렌더링하는 전 과정을 설계하여, 면접 종료 후 사용자가 리포트를 요청하면 5분 내에 리포트가 생성·전달되는 구조를 구현했음. 이 파이프라인은 현재 상용 서비스에 적용되어 운영 중임.
            기획한 프로토타입은 팀 내 검토를 거쳐 정식 상용 제품으로 전환됐으며, 출시 한 달 만에 가입자 200명을 돌파했음. 이후 팀 플래닝, 내부 리포트 자동화 등 후속 제품 기획에도 참여했으며, n8n 기반 파이프라인 구조는 이후 다수 프로젝트의 자동화 표준으로 활용됐음.
            
