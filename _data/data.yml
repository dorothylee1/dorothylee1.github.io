      - title: 클라썸(Telta AI) | 국내 최대 공기업 인재육성실 리더십 역량 진단 운영 및 자동화
        tagline: | 
            리더십센터 프로젝트에서의 성과를 바탕으로 본사 인재육성실까지 확장 발주된 건임. 신임 사원 리더십 역량 제고를 위해 2~3개월 주기의 워크숍을 운영하는 구조로, 파트너사가 현장 코칭·운영을 담당하고 텔타는 문항 설계·고도화, 육성 과정 전·후 리더십 유형 및 역량 변화 리포트 발행, 대시보드 구현을 전담함. 
            리포트 품질 확보를 위해 3단계 QA 파이프라인을 직접 설계·구축함. 1차(데이터 무결성)에서는 Rule-based validation engine으로 입력 데이터 완결성·슬롯 매핑·이상값을 자동 검증하고, 2차(콘텐츠 품질)에서는 LLM-as-a-Judge 방식으로 문장 형식·분량 기준·채점 정확도를 평가하며, 3차(산출물 정합성)에서는 Vision LLM으로 최종 PDF를 파싱해 차트·그래프 수치와 원천 데이터 간 Cross-validation을 수행함. 
            각 단계에서 Fail 시 자동으로 초안 생성 단계로 회귀하는 루프 구조로 설계해 99.9% 완결성 있는 리포트를 구현함. 입찰 과정에서는 실제 운영 시나리오를 시뮬레이션한 데모를 직접 제작해 제시했음. 
            진단 직후 결과가 즉시 반영되는 자동화 파이프라인과 대시보드 구성을 기획·구현하여 의사결정자에게 실시간 인사이트 제공 구조를 시연함. 그 결과 200~300명 규모 진단을 오류 0건으로 운영했고, 이 성과가 2026년 5억 원 규모 입찰 건으로 이어지는 데 직접 기여함.
        details: |
