projects:
    title: Projects
    assignments:
      - title: 클라썸(Telta AI) | Telta InterviewPro - 채용 면접 AI 도구 제품 기획 
        tagline: | 
            We developed an AI-powered service designed to address one of the most time-consuming challenges for consultants&#58; searching for relevant past project proposals.  
            Traditionally, identifying suitable reference proposals requires extensive manual effort and deep domain knowledge. 
            Proposal Finder transforms this process by enabling natural language search, allowing users to describe their needs intuitively.  
            Leveraging advanced query rewriting and tagging-based search technologies, the system refines user input into optimized search queries and matches them against a structured proposal database. 
            This enables rapid discovery of highly relevant proposals, even when exact keywords are not provided.  
            As a result, consultants can significantly reduce time spent on research, improve proposal quality through better references, and focus more on high-value strategic work rather than manual document retrieval.
        details: |
            -  [<u>[PPT] Proposal Finder</u>](https://docs.google.com/presentation/d/1YAyXTaLoV815kN1sZLOn-EsjW1k47U3bsgT-ozFo6RU/edit?usp=sharing)
            -  [<u>[Video] Demo</u>](https://drive.google.com/file/d/1sJWRashkAzDcTzvTsVQPIFfiLDoYD5YK/view?usp=sharing)
            
      - title: 클라썸(Telta AI) | 국내 최대 공기업 리더십 역량 진단 프로젝트 운영 및 자동화
        tagline: | 
            기존에는 코치(사람) 중심의 평가에 의존해 객관성이 부족했음. 채점자 주관에 따른 편차가 컸고, 직급별 점수 구간 기준이 모호해 정확한 평가에 한계가 있었음. 
            이를 해결하기 위해 7개 직급 × 4개 루브릭 체계로 총 28개 루브릭을 고도화함. HR 전문가가 설계한 평가 행동 기준 루브릭 초안을 기반으로, 직급별 난이도 차별화를 위해 관련 논문 및 리더십 이론을 추가 리서치하고 반영함. AI 모델 간 평가 결과 편차를 통계적으로 실험·검증하여 최종 약 5만 줄 규모의 채점 루브릭을 완성했고, 루브릭 생성 로직 자체를 데이터 파이프라인과 연계해 자동화함. 
            또한 n8n 기반 자동화 파이프라인을 구축해 50명 규모 리포트가 5분 내 생성되도록 처리 속도를 단축했음. 진단 결과를 누적 DB화하여 시계열 데이터로 관리할 수 있도록 구조를 설계했고, 이를 기반으로 한 대시보드를 직접 제작해 제품에 탑재함. 
            그 결과 누적 300명 이상의 진단과 2,000부의 리포트를 오류 없이 딜리버리했고, 이 신뢰를 바탕으로 월 누적 1천만 원 이상, 연간 누적 N억 원 이상의 리커링 계약으로 확장됨. 고객사 본사에서 대표 및 텔타 팀을 초빙해 강연을 요청했으며, 타 부서로도 추천이 이어져 현재까지 프로젝트가 지속·확장되고 있음.
        details: |
            -  [<u>[PPT] Loan & Deposit Automation</u>](https://docs.google.com/presentation/d/1ulW8rp6r0cwi53zuq8z1lZzt6RSuGmO2fMTYGVbKp7o/edit?usp=sharing)
            -  [<u>[Video] Loan</u>](https://drive.google.com/file/d/1OQrUU2ZelCIXTgz-TSkG3dcXsdsVPSH6/view?usp=sharing)
            -  [<u>[Video] Deposit</u>](https://drive.google.com/file/d/1Dbq98zq_g_4Aaq__rzrTOHyp0in82fnV/view?usp=sharing)

      - title: 클라썸(Telta AI) | 국내 최대 공기업 인재육성실 리더십 역량 진단 운영 및 자동화
        tagline: | 
            리더십센터 프로젝트에서의 성과를 바탕으로 본사 인재육성실까지 확장 발주된 건임. 신임 사원 리더십 역량 제고를 위해 2~3개월 주기의 워크숍을 운영하는 구조로, 파트너사가 현장 코칭·운영을 담당하고 텔타는 문항 설계·고도화, 육성 과정 전·후 리더십 유형 및 역량 변화 리포트 발행, 대시보드 구현을 전담함. 
            리포트 품질 확보를 위해 3단계 QA 파이프라인을 직접 설계·구축함. 1차(데이터 무결성)에서는 Rule-based validation engine으로 입력 데이터 완결성·슬롯 매핑·이상값을 자동 검증하고, 2차(콘텐츠 품질)에서는 LLM-as-a-Judge 방식으로 문장 형식·분량 기준·채점 정확도를 평가하며, 3차(산출물 정합성)에서는 Vision LLM으로 최종 PDF를 파싱해 차트·그래프 수치와 원천 데이터 간 Cross-validation을 수행함. 
            각 단계에서 Fail 시 자동으로 초안 생성 단계로 회귀하는 루프 구조로 설계해 99.9% 완결성 있는 리포트를 구현함. 입찰 과정에서는 실제 운영 시나리오를 시뮬레이션한 데모를 직접 제작해 제시했음. 
            진단 직후 결과가 즉시 반영되는 자동화 파이프라인과 대시보드 구성을 기획·구현하여 의사결정자에게 실시간 인사이트 제공 구조를 시연함. 그 결과 200~300명 규모 진단을 오류 0건으로 운영했고, 이 성과가 2026년 5억 원 규모 입찰 건으로 이어지는 데 직접 기여함.
        details: |
            -  [<u>[PPT] Smart Material Management</u>](https://docs.google.com/presentation/d/1MCP6iupKd472IKZk6e-W_N_Ljcr51UmMTKiPAWmivLI/edit?usp=sharing)
            -  [<u>[Video] Demo</u>](https://drive.google.com/file/d/1XJRjqBGWwvmZsckGl9dWsDlj-W5bU299/view?usp=sharing)
            -  [<u>[Article]<i> S-OIL Adopts AI Agent, Expects to Save 5,000 Work Hours Annually</i></u>](https://www.donga.com/news/Economy/article/all/20260116/133169707/1)
            
      - title: 클라썸(Telta AI) | 국내 대형 반도체 장비기업 전사 직무 역량 진단 운영 및 자동화
        tagline: | 
            고객사는 기존에 HR 담당자가 엑셀 수기 입력과 부서 간 이메일을 통해 전사 직무역량·리더십 진단을 운영하고 있었음. 해당 방식은 휴먼 에러 발생이 잦고 운영 공수가 과도하게 소요되었으며, 개인별 리포트 발행에 구조적 한계가 존재했음.
            이를 해결하기 위해 다면진단 수행에 필요한 기능 요구사항을 PRD로 작성하여 제품팀에 직접 제안했음. PM과 기능 우선순위를 협의하고 반복적인 시뮬레이션을 통해 기능을 구현했으며, 파일럿 운영 과정에서 실제 고객사 사용 환경의 문제를 즉각 피드백하여 시스템을 고도화했음.
            본 진단이 승진·성과 평가와 직결되는 특성상 정확도 확보가 최우선 과제였음. 직급·부서·연차별로 상이한 가중치를 통합한 Master Map 데이터를 설계하고, Apps Script 기반으로 복잡한 점수 산출 로직을 자동화했음. 여기에 AI 모델을 연결하여 피진단자별 맞춤 성장 가이드 문구를 생성해 리포트에 탑재했으며, 고객사 보유 교육과정 데이터 풀을 정제하여 개인별 강점·보완점에 기반한 교육과정 자동 매칭 프롬프트를 설계했음. 이후 개발자들과 협업하여 해당 기능을 제품 내부 기능으로 내재화했음.
            그 결과 1,350명 규모의 전사 역량 진단을 오류 없이 운영했고, 수기 기반 프로세스를 시스템화함으로써 고객사 HR 운영 효율을 구조적으로 개선했음. 개인화된 리포트 및 교육과정 매칭 기능은 단순 진단 결과 전달을 넘어 구성원의 실질적 성장 경로를 제시하는 HR 의사결정 도구로 기능했으며, 이에 대한 고객사의 높은 만족을 바탕으로 2026년 2배 이상 규모의 리커링 계약을 확보했음.
        details: |
            -  [<u>[PPT] Information Security Disclosure AI</u>](https://docs.google.com/presentation/d/1YF2Mjg39UGWne85dkxrGqGe1Y_DGP3ndLtMZGiV8czs/edit?usp=sharing)
            -  [<u>[Video] Demo</u>](https://drive.google.com/file/d/1DBh1nAKNEMjz775tiS9NVCkE1KxLooSD/view?usp=drive_link)
            -  [<u>[Article]<i> KPMG Launches AI-Based Smart Information Security Disclosure Automation Platform</i></u>](https://www.datanet.co.kr/news/articleView.html?idxno=201925)

      - title: KPMG | Automated Ad Compliance Analyzer
        tagline: | 
            Before sending advertisements to advertisers, companies must undergo preliminary review based on internal advertising regulations. 
            This preliminary advertising review is not about expertise, but rather a task of meticulously examining content according to internal guidelines. 
            In other words, it's a simple repetitive task. We developed a service that automates this process using Large Language Models (LLMs). 
            The system processes advertising data through image conversion, text extraction, and analysis via LLM to evaluate compliance with regulations. 
            Through this service, company advertising managers can now know the compliance rate of advertisements without needing to conduct preliminary reviews themselves.
        details: |
            -  [<u>[PPT] Samsung_ad_PoC</u>](https://docs.google.com/presentation/d/1dDnRib945di0b807KQ7pyAX8_gzIlTReCLa-HHR1fVU/edit?usp=sharing)
            -  [<u>[Video] Demo</u>](https://drive.google.com/file/d/1OICXoLQvxIHGPGxLgziD3tW2zUAnLNZI/view?usp=sharing)
      
      - title: KPMG | Trade AI&#58; Revolutionizing Access to U.S. trade administration
        tagline: | 
            We developed a solution that tackles the overwhelming daily document uploads on the U.S. trade administration (https://access.trade.gov/), 
            eliminating the need for customs experts to manually search through vast amounts of data. By implementing a RAG (Retrieval-Augmented Generation)
            system, we've created an automated workflow that crawls, collects, and vectorizes documents in a Milvus database, allowing for efficient cosine 
            similarity searches. Customers can now instantly discover relevant cases and make inquiries about them through our intuitive chatbot interface. 
            Our query-rewriting technology extracts filtering elements such as year and case codes from customer queries, enabling targeted vector searches 
            and significantly enhancing performance for customs experts.
        details: |
            -  [<u>[PPT] Trade AI</u>](https://docs.google.com/presentation/d/1xy64G-OWrt_Cec5OEJwP4cHVWsT6n9bh61ZiFfLlArg/edit?usp=sharing)
            -  [<u>[Table] Qualitative evaluation for trade AI</u>](https://docs.google.com/spreadsheets/d/18-tnpUWg0VXfrWvEcGOkj-Ok70jKF7yTTF02zg9VGBE/edit?usp=sharing)
            -  [<u>[Video] Demo</u>](https://drive.google.com/file/d/1y92ypQ7xa6eV9b1bgIRv6FO7F7fdbK4b/view?usp=sharing)
            
      - title: KPMG | Empowering Security Policy Analysis with AI
        tagline: | 
            Reviewing and improving corporate security policies and guidelines is a challenging process that often leads to inconsistent quality based on the reviewer's
            expertise. Our innovative tool leverages Large Language Models to analyze security policies with consistent performance and accuracy. By utilizing KPMG's
            extensive database of over 300 security-related resources and AI-powered web searches, we comprehensively review policies to identify missing elements and
            ensure alignment with the latest security trends. The system delivers rapid, precise assessments while maintaining uniform quality standards regardless of
            the complexity of the security framework. Additionally, we provide an intuitive chatbot service that allows users to ask questions based on the analysis 
            results, making security policy management more efficient and effective.
        details: |
            -  [<u>[Video] Security Policy Analysis Tool&#58; Powered by AI</u>](https://drive.google.com/file/d/1jQsCxqj_f1y3KY931r1e8algTwl_1Zc2/view?usp=sharing)
