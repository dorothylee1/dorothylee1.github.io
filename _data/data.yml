      - title: 클라썸(Telta AI) | 국내 통신 대기업 - PO 역량 (사전·사후 비교) 진단 운영 및 자동화
        tagline: | 
            고객사는 PO(Product Owner) 직군을 대상으로 육성 프로그램 도입 전·후의 역량 변화를 객관적 수치로 비교·검증하고자 했음. 정성적 피드백에 의존하던 기존 방식으로는 육성 효과를 정량적으로 입증하기 어려웠으며, 이를 데이터 기반으로 증명할 수 있는 진단 체계가 필요한 상황이었음.
            운영 과정에서 발생하는 비효율을 해소하기 위해 인터뷰어와 피진단자 간의 일정 조율을 자동화하는 AI 기반 도구를 직접 제작했음. 인터뷰 녹음 파일을 전달받은 후 내부 STT 변환 툴과 연동하여 텍스트로 변환하고, AI 채점 모델을 통해 역량별 점수를 산출했으며, 점수 계산 스크립트를 설계하여 사전·사후 결과를 정량적으로 비교할 수 있는 리포트를 최초로 설계·딜리버리했음. 회사 내에 전례가 없던 사전·사후 비교 리포트 형태를 처음으로 구현한 사례로, 이후 동일 포맷이 타 프로젝트의 표준으로 활용됐음.
            그 결과 고객사는 육성 프로그램의 효과를 데이터 기반으로 검증할 수 있게 되었으며, 역량 변화의 정량적 근거를 확보함으로써 내부 HR 의사결정의 신뢰도를 높였음. 이 성과를 바탕으로 같은 기업의 핵심 인재 프로젝트 리커링 계약으로 이어졌음.
