career-profile:
    title: Welcome to Shin Hyung's page
    summary: |
      학부에서 경영학과 커뮤니케이션을 복수전공하고, <a href="https://btm.kaist.ac.kr/"><u>KAIST 기술경영대학원</u></a>에서  <a href="https://sites.google.com/view/q-marketinglab/"><u>퀀트 마케팅(Quantitative Marketing)</u></a>을 전공했습니다. 퀀트 마케팅은 시장을 데이터 기반으로 분석·모델링하여 비즈니스 임팩트를 예측하는 학문으로, 이 과정에서 데이터 기반 의사결정과 비즈니스 문제 해결에 깊은 관심을 갖게 되었습니다.</p>
      졸업 후에는 <a href="https://www.kakaocorp.com/page/"><u>카카오</u></a> <a href="https://brunch.co.kr/@kakao-it"><u>정책팀 Researcher</u></a>로 근무하며, 대형 플랫폼 기업에서 다양한 이해관계자와 협업하고 복잡한 이슈를 구조화해 해결하는 경험을 쌓았습니다. 거시적인 기술·사업 트렌드를 살피는 과정에서 "AI는 단순한 기술이 아니라 업무 프로세스를 근본적으로 바꾸는 도구"라는 확신이 생겼고, 이를 실제 현장에서 직접 구현하고자 AI 기반 에듀테크/HR 사업을 운영하는 <a href="https://business.classum.com/"><u>CLASSUM</u></a>에 합류했습니다.</p>
      현재는 CLASSUM의 AI 기반 HR 컨설팅 솔루션 <a href="https://www.telta.ai/"><u>Telta</u></a>의 초기 멤버로, <a href="https://business.classum.com/blog/interview-dorothy"><u>Project Delivery Manager</u></a>로서 솔루션을 고도화하고 있습니다. 스킬 진단 설계부터 AI 채점, 리포트 자동화, 대시보드 구현까지 서비스의 전 과정을 직접 운영하고 설계합니다. 국내 4대 그룹 계열사 및 최대 공기업을 포함한 10여 개 엔터프라이즈 고객사에 누적 3,500명 이상의 진단을 오류 없이 딜리버리했으며, 신사업 론칭 8개월 만에 2자리 억대 매출 달성에 기여했습니다. 직접 기획한 채용 인터뷰 AI 도구 <a href="https://www.telta.ai/interview-pro"><u>Interview Pro</u></a>는 상용 제품으로 전환되어 출시 한 달 만에 가입자 200명을 돌파했습니다.</p>
      저는 복잡한 엔터프라이즈 환경에서 고객의 문제를 직접 정의하고, 이를 자동화와 제품화로 연결해온 사람입니다. 고객사 요구를 기술 요구사항으로 번역하고, 없는 기능은 직접 만들어 딜리버리하며, 그 과정에서 도출된 로직이 실제 제품 기능으로 내재화되는 사이클을 반복해왔습니다. 제품팀·개발팀·HR 전문가·사업개발팀 사이에서 각 팀의 언어를 이해하고 조율하며, 고객사–파트너사–내부팀 간 3자 구조의 이해관계를 핸들링하는 커뮤니케이션을 직접 설계했습니다. 아이디어를 PRD로 만들고, PRD가 제품이 되고, 제품이 매출로 이어지는 전 과정을 현장에서 경험했습니다.</p>
      AI 전환(AX) 시대에 기술과 비즈니스의 교차점에서 실질적인 문제를 해결하는 것이 저의 일이자 관심사입니다.</p>
           
